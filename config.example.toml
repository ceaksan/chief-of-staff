[paths]
obsidian_vault = "/path/to/your/vault"
daily_notes_dir = "Daily"
health_scripts_dir = "/path/to/your/monitoring/scripts"
cos_dir = "~/.chief-of-staff"

[calendars]
# Calendar IDs to scan (from gcal_list_calendars output)
# Use "primary" for your main calendar, or specific email addresses
ids = ["primary"]
ai_plan_calendar_id = ""  # created during setup

[gmail]
# Labels to exclude from scanning
exclude_labels = ["SPAM", "TRASH", "CATEGORY_PROMOTIONS", "CATEGORY_SOCIAL", "CATEGORY_UPDATES"]
# Only scan emails from the last N hours
lookback_hours = 24

[claude]
collector_budget = 2.00
classifier_budget = 1.50
sweep_budget = 3.00
dayblock_budget = 1.00
collector_model = "sonnet"
classifier_model = "sonnet"
sweep_model = "opus"
dayblock_model = "sonnet"

[schedule]
collector_time = "06:00"

[classification]
# Keywords that always classify as YOURS (human required)
force_yours = ["pricing", "strategy", "contract", "negotiation", "proposal"]
# Keywords that always classify as DISPATCH (AI handles fully)
force_dispatch = ["meeting confirmation", "calendar update", "subscription renewal"]

[dayblock]
# Time preferences
deep_work_start = "07:00"
deep_work_end = "12:00"
content_start = "13:00"
content_end = "17:00"
admin_start = "17:00"
admin_end = "18:00"
# Days for gym (0=Monday, 6=Sunday)
gym_days = [1, 3, 5]
gym_time = "07:00"
gym_duration = 90

[health]
# Map project names to their monitoring script paths
# [health.projects]
# leetty = "/path/to/leetty/health.py"
# validough = "/path/to/validough/health.py"

[miniflux]
# Self-hosted Miniflux RSS reader (https://miniflux.app)
base_url = "https://your-miniflux-instance.example.com"
api_token = "your-miniflux-api-token"
max_entries = 50
lookback_hours = 24
mark_read = false

[radar]
# Path to Opportunity Radar's pending.json export file
# Generated by: cd opportunity-radar && python cli.py run
pending_json = "../opportunity-radar/output/pending.json"

[code_review]
# Path to daily-code-review (dnm-audit) report output directory
# Reports are expected at: {reports_dir}/{YYYY-MM-DD}/DIGEST.md
# Leave empty to disable code health section in Daily Note
reports_dir = ""

[healthchecks]
# Healthchecks.io ping URLs (free tier: 20 checks, 100 log entries/check)
# Create checks at https://healthchecks.io and paste ping URLs here
pipeline_url = ""    # full pipeline run
feed_url = ""        # standalone feed collector
weekly_url = ""      # weekly stats digest

[projects]
# Map vault directory names to human-readable project names
# Used by the renderer to show project attribution on tasks
# my-project-dir = "My Project Name"

[agents]
# Folders the Content Agent can write to (relative to vault root)
content_write_folders = ["Content/Drafts", "Research"]
# Folders the Calendar Agent can write to
calendar_write_folders = ["Daily"]
